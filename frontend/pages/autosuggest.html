<!DOCTYPE html>
<html lang="en">
<head>

    <title>Auto Suggest</title>
    <link rel="stylesheet" href="../css/autosuggest.css">
</head>
<body>
    <div class="top-right">
        <span class="gear">&#9881</span> 
       <span class="pill">&#8226 online | &#128336 -ms</span>

        <h1>
            <span style="color: blue;">Being</span><span style="color: black;">Infinity</span>

            <span class="lens">&#128269</span>
